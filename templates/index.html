<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Horizon AI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body class="bg-slate-950 text-white">

  <div class="flex h-screen">

    <!-- Sidebar -->

    <div class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col">

      <div class="p-6">

        <h1 class="text-2xl font-bold">

          🌍 Horizon AI

        </h1>

        <p class="text-slate-400 mt-2">

          Travel Assistant

        </p>

      </div>

      <button onclick="newChat()" class="mx-4 mb-4 bg-blue-600 hover:bg-blue-700 rounded-xl py-3">

        + New Chat

      </button>

    </div>

    <!-- Main -->

    <div class="flex-1 flex flex-col">

      <!-- Header -->

      <div class="border-b border-slate-800 p-5">

        <h2 class="text-xl font-semibold">

          Horizon Tours Knowledge Assistant

        </h2>

      </div>

      <!-- Chat -->

      <div id="chat-box" class="flex-1 overflow-y-auto p-8">
      
        <div id="welcome" class="flex h-full items-center justify-center">
      
          <div class="text-center max-w-xl">
      
            <div class="text-6xl mb-6">
              🌍
            </div>
      
            <h1 class="text-4xl font-bold mb-4">
      
              Horizon AI Assistant
      
            </h1>
      
            <p class="text-slate-400 text-lg">
      
              Your intelligent travel companion powered by Gemini.
      
            </p>
      
            <div class="mt-10 grid grid-cols-2 gap-4">
      
              <div class="bg-slate-800 rounded-xl p-4">
      
                ✈️
      
                <br><br>
      
                Travel Packages
      
              </div>
      
              <div class="bg-slate-800 rounded-xl p-4">
      
                🌎
      
                <br><br>
      
                Destinations
      
              </div>
      
              <div class="bg-slate-800 rounded-xl p-4">
      
                🛂
      
                <br><br>
      
                Visa Information
      
              </div>
      
              <div class="bg-slate-800 rounded-xl p-4">
      
                📞
      
                <br><br>
      
                Company Policies
      
              </div>
      
            </div>
      
          </div>
      
        </div>
      
      </div>

      <!-- Input -->

      <div class="border-t border-slate-800 p-6">

        <div class="flex gap-4">

          <textarea id="question" rows="2"
            class="flex-1 rounded-xl bg-slate-900 border border-slate-700 p-4 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ask anything about Horizon Tours..."></textarea>

          <button onclick="sendQuestion()" class="bg-blue-600 hover:bg-blue-700 px-8 rounded-xl">

            Send ➤

          </button>

        </div>

      </div>

    </div>

  </div>

  <script src="/static/app.js"></script>

</body>

</html>
